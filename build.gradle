    'f_256905_': 'FOLIAGE_PLACER_TYPE',  // net.minecraft.core.registries.Registries
    'f_49999_': 'OAK_LOG',               // net.minecraft.world.level.block.Blocks (1.20.4中间名->1.20.1语义名)
    'f_50000_': 'SPRUCE_LOG',            // net.minecraft.world.level.block.Blocks
    'f_50002_': 'JUNGLE_LOG',            // net.minecraft.world.level.block.Blocks
    'f_50050_': 'OAK_LEAVES',            // net.minecraft.world.level.block.Blocks
    'f_50051_': 'SPRUCE_LEAVES',         // net.minecraft.world.level.block.Blocks
    'f_50053_': 'JUNGLE_LEAVES',         // net.minecraft.world.level.block.Blocks
    'f_56736_': 'WOOD',                  // net.minecraft.world.level.block.SoundType
    'f_56740_': 'GRASS',                 // net.minecraft.world.level.block.SoundType
    'f_56758_': 'CROP',                  // net.minecraft.world.level.block.SoundType
    'f_61362_': 'WATERLOGGED',           // net.minecraft.world.level.block.state.properties.BlockStateProperties
    'f_65760_': 'TREE',                  // net.minecraft.world.level.levelgen.feature.Feature
]

// 收集所有需要修补的模组配置
def patchConfigs = [
    // ------------------------------------------------------------------------
    // IMBlocker (跨版本 Mixin Refmap 修补)
    // ------------------------------------------------------------------------
    // 【问题】IMBlocker 是跨版本模组（1.19.4-1.20.4），其 mixin refmap 中使用
    //   SRG 混淆名（如 m_1234_），但 1.20.1 Forge 开发环境使用官方映射（mojmap），
    //   方法名为语义名称，导致 Mixin 注入失败。
    // 【修补模式】REFMAP_ONLY - 仅修补 refmap 文件中的方法签名
    // ------------------------------------------------------------------------
    [modName: 'IMBlocker', originalJar: 'IMBlocker-5.0.2-1.19.4-1.20.4.jar', fixedVersion: '5.0.2-1.20.1-fixed', patchMode: 'REFMAP_ONLY'],
    
    // ------------------------------------------------------------------------
    // Blueprint (必须前置 — 跨版本 Mixin Refmap 修补)
    // ------------------------------------------------------------------------
    // 【问题】Blueprint 是 TeamAbnormals 模组的通用前置，虽然版本标注 1.20.1，
    //   但内部 mixin refmap 使用 SRG 方法名（m_xxxx_），与 mojmap 运行时不兼容。
    //   此外 JSON 配置文件中也可能包含 SRG 名。
    // 【修补模式】JSON_ALL - 修补所有 JSON 文件中的 SRG 名
    // ------------------------------------------------------------------------
    [modName: 'Blueprint', originalJar: 'blueprint-1.20.1-7.1.3.jar', fixedVersion: '7.1.3-fixed', patchMode: 'JSON_ALL'],
    
    // ------------------------------------------------------------------------
    // Atmospheric (必须前置 — 跨版本 Mixin Refmap 修补)
    // ------------------------------------------------------------------------
    // 【问题】Atmospheric 是 Neapolitan 的前置模组，使用 Blueprint 框架，
    //   同样存在 SRG→mojmap 的混淆名不匹配问题。
    // 【修补模式】JSON_ALL - 与 Blueprint 相同的修补逻辑
    // ------------------------------------------------------------------------
    [modName: 'Atmospheric', originalJar: 'atmospheric-1.20.1-6.1.1.jar', fixedVersion: '6.1.1-fixed', patchMode: 'JSON_ALL'],
    
    // ------------------------------------------------------------------------
    // Neapolitan (必须前置 — 跨版本 Mixin Refmap 修补)
    // ------------------------------------------------------------------------
    // 【问题】Neapolitan 是提供香蕉等物品的模组，依赖 Blueprint 框架，
    //   同样存在 SRG→mojmap 的混淆名不匹配问题。
    // 【修补模式】JSON_ALL - 与 Blueprint/Atmospheric 相同的修补逻辑
    // ------------------------------------------------------------------------
    [modName: 'Neapolitan', originalJar: 'neapolitan-1.20.1-5.1.0.jar', fixedVersion: '5.1.0-fixed', patchMode: 'JSON_ALL'],
    
    // ------------------------------------------------------------------------
    // Pam's HarvestCraft 2 - Food Core (跨版本兼容修补)
    // ------------------------------------------------------------------------
    // 【问题背景】Pam HC2 是用 1.20.4 Forge MDK 编译的，使用中间名 f_xxxxx_
    // 【修补模式】CLASS_BYTECODE - Java 字节码级常量池修补
    // ------------------------------------------------------------------------
    [modName: 'PamHC2FoodCore', originalJar: 'pamhc2foodcore-1.20.4-1.0.5.jar', fixedVersion: '1.20.4-1.0.5-patched', patchMode: 'CLASS_BYTECODE', fieldMap: pamFieldMap],
    
    // ------------------------------------------------------------------------
    // Pam's HarvestCraft 2 - Crops (跨版本兼容修补)
    // ------------------------------------------------------------------------
    [modName: 'PamHC2Crops', originalJar: 'pamhc2crops-1.20-1.0.3.jar', fixedVersion: '1.20-1.0.3-patched', patchMode: 'CLASS_BYTECODE', fieldMap: pamFieldMap],
    
    // ------------------------------------------------------------------------
    // Pam's HarvestCraft 2 - Trees (跨版本兼容修补)
    // ------------------------------------------------------------------------
    // 【问题背景】Pam HC2 Trees 是用 1.20.4 Forge MDK 编译的，使用中间名 f_xxxxx_
    // 【修补模式】CLASS_BYTECODE - Java 字节码级常量池修补
    // ------------------------------------------------------------------------
    [modName: 'PamHC2Trees', originalJar: 'pamhc2trees-1.20-1.0.2.jar', fixedVersion: '1.20-1.0.2-patched', patchMode: 'CLASS_BYTECODE', fieldMap: pamFieldMap],
]

// 执行所有修补并收集依赖信息
def patchedMods = []
patchConfigs.each { config ->
    def result = patchModJar(config)
    if (result != null && result.jar.exists()) {
        patchedMods.add(result)
        logger.lifecycle("[Patch] Registered ${result.name}:${result.version} from ${result.dir}")
    }
}

dependencies {
    // Specify the version of Minecraft to use.
    // Any artifact can be supplied so long as it has a "userdev" classifier artifact and is a compatible patcher artifact.
    // The "userdev" classifier will be requested and setup by ForgeGradle.
    // If the group id is "net.minecraft" and the artifact id is one of ["client", "server", "joined"],
    // then special handling is done to allow a setup of a vanilla dependency without the use of an external repository.
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"

    // ====================================================================================
    // 注册修补后的跨版本模组依赖
    // ====================================================================================
    // 为每个成功修补的模组添加 flatDir 仓库和 runtimeOnly 依赖
    // ====================================================================================
    patchedMods.each { mod ->
        // 动态添加 flatDir 仓库
        repositories.flatDir { dirs mod.dir }
        // 添加运行时依赖
        runtimeOnly fg.deobf("blank:${mod.name}:${mod.version}")
        logger.lifecycle("[Dependencies] Added runtimeOnly: blank:${mod.name}:${mod.version}")
    }

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation fg.deobf("blank:coolmod-${mc_version}:${coolmod_version}")

    // JEI - Just Enough Items (optional dependency for development)
    compileOnly(fg.deobf("mezz.jei:jei-${minecraft_version}-common-api:15.19.0.84"))
    compileOnly(fg.deobf("mezz.jei:jei-${minecraft_version}-forge-api:15.19.0.84"))
    runtimeOnly(fg.deobf("mezz.jei:jei-${minecraft_version}-forge:15.19.0.84"))

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version: minecraft_version, minecraft_version_range: minecraft_version_range,
            forge_version: forge_version, forge_version_range: forge_version_range,
            loader_version_range: loader_version_range,
            mod_id: mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: mod_version,
            mod_authors: mod_authors, mod_description: mod_description,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/mods.toml', 'pack.mcmeta']) {
        expand replaceProperties + [project: project]
    }
}

// Example for how to get properties into the manifest for reading at runtime.
tasks.named('jar', Jar).configure {
    manifest {
        attributes([
                'Specification-Title'     : mod_id,
                'Specification-Vendor'    : mod_authors,
                'Specification-Version'   : '1', // We are version 1 of ourselves
                'Implementation-Title'    : project.name,
                'Implementation-Version'  : project.jar.archiveVersion,
                'Implementation-Vendor'   : mod_authors,
                'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }

    // This is the preferred method to reobfuscate your jar file
    finalizedBy 'reobfJar'
}

// However if you are in a multi-project build, dev time needs unobfed jar files, so you can delay the obfuscation until publishing by doing:
// tasks.named('publish').configure {
//     dependsOn 'reobfJar'
// }

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/mcmodsrepo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// ====================================================================================
// 手动修补任务 - 用于强制重新生成修补后的 JAR
// ====================================================================================
// 这些任务允许开发者在需要时手动重新执行特定模组的修补过程，
// 例如当 MCP 映射更新或需要调试修补逻辑时。
// ====================================================================================

// Regenerate the fixed IMBlocker JAR manually: gradlew fixImblockerRefmap
tasks.register('fixImblockerRefmap') {
    doLast {
        logger.lifecycle('Manually patching IMBlocker...')
        patchModJar(
            modName: 'IMBlocker',
            originalJar: 'IMBlocker-5.0.2-1.19.4-1.20.4.jar',
            fixedVersion: '5.0.2-1.20.1-fixed',
            patchMode: 'REFMAP_ONLY'
        )
    }
}

// Fix Blueprint refmap & JSON configs: gradlew fixBlueprintRefmap
tasks.register('fixBlueprintRefmap') {
    doLast {
        logger.lifecycle('Manually patching Blueprint...')
        patchModJar(
            modName: 'Blueprint',
            originalJar: 'blueprint-1.20.1-7.1.3.jar',
            fixedVersion: '7.1.3-fixed',
            patchMode: 'JSON_ALL'
        )
    }
}

// Fix Atmospheric refmap & JSON configs: gradlew fixAtmosphericRefmap
tasks.register('fixAtmosphericRefmap') {
    doLast {
        logger.lifecycle('Manually patching Atmospheric...')
        patchModJar(
            modName: 'Atmospheric',
            originalJar: 'atmospheric-1.20.1-6.1.1.jar',
            fixedVersion: '6.1.1-fixed',
            patchMode: 'JSON_ALL'
        )
    }
}

// Fix all refmaps at once: gradlew fixAllRefmaps
tasks.register('fixAllRefmaps') {
    doLast {
        logger.lifecycle('Fixing all refmaps (SRG -> official)...')
        tasks.findByName('fixImblockerRefmap')?.actions?.each { it.execute() }
        tasks.findByName('fixBlueprintRefmap')?.actions?.each { it.execute() }
        tasks.findByName('fixAtmosphericRefmap')?.actions?.each { it.execute() }
        logger.lifecycle('All refmaps patched successfully!')
    }
}

